{% extends "base.html" %}
{% block content %}
<div class="container" style="margin-top:40px;">
    <div style="display:flex; flex-wrap:wrap; gap:30px;">
        <div style="flex:2; min-width:300px;">
            {% if plot.images %}
                <img src="{{ url_for('static', filename='uploads/' + plot.images[0].filename) }}" style="width:100%; border-radius:15px; height:500px; object-fit:cover;">
            {% endif %}
            
            <h3 style="margin-top:30px;">Location Map</h3>
            <div class="map-container">
                <iframe width="100%" height="100%" frameborder="0" style="border:0"
                    src="https://www.google.com/maps?q={{ plot.location|urlencode }}&output=embed" allowfullscreen>
                </iframe>
            </div>
        </div>

        <div style="flex:1; min-width:300px; background:white; padding:30px; border-radius:15px; box-shadow:0 10px 20px rgba(0,0,0,0.05);">
            <h1 style="color:var(--primary-blue)">{{ plot.title }}</h1>
            <div class="price" style="font-size:2rem;">TZS {{ "{:,.0f}".format(plot.price) }}</div>
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            <p><strong><i class="fa fa-ruler"></i> Size:</strong> {{ plot.sqm_size }} Sqm</p>
            <p><strong><i class="fa fa-info-circle"></i> Status:</strong> {{ plot.status }}</p>
            <p style="margin-top:20px;">{{ plot.description }}</p>
            
            <a href="https://wa.me/255658200422" class="btn btn-blue" style="width:100%; margin-top:20px;">Contact via WhatsApp</a>
        </div>
    </div>
</div>
{% endblock %}
