<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tanzania Plots Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-tz-blue { background-color: #0A192F; }
        .text-tz-gold { color: #D4AF37; }
        .border-tz-gold { border-color: #D4AF37; }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-tz-blue min-h-screen flex items-center justify-center px-6">

    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <a href="/" class="inline-flex flex-col items-center">
                <span class="text-white font-black text-3xl italic tracking-tighter">TANZANIA PLOTS</span>
                <span class="text-tz-gold text-[10px] font-bold uppercase tracking-[0.4em] mt-1">Management Portal</span>
            </a>
        </div>

        <div class="login-card p-10 rounded-[2.5rem] shadow-2xl border border-white/10">
            <h2 class="text-2xl font-black text-slate-900 mb-2">Karibu Tena</h2>
            <p class="text-slate-500 text-sm mb-8">Ingia kusimamia viwanja na maombi ya wateja.</p>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-r-xl">
                    <p class="text-red-700 text-xs font-bold uppercase tracking-widest">{{ messages[0] }}</p>
                </div>
              {% endif %}
            {% endwith %}

            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Username</label>
                    <div class="relative mt-1">
                        <input type="text" name="username" required 
                               class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:ring-2 ring-tz-gold transition text-sm"
                               placeholder="Admin Username">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nywila (Password)</label>
                    <div class="relative mt-1">
                        <input type="password" name="password" required 
                               class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:ring-2 ring-tz-gold transition text-sm"
                               placeholder="••••••••">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" 
                            class="w-full bg-tz-blue text-white font-black py-5 rounded-2xl uppercase tracking-widest text-xs hover:bg-tz-gold hover:text-tz-blue transition-all shadow-xl shadow-blue-900/20">
                        Ingia Sasa
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 text-center">
                <a href="/" class="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-tz-gold transition">
                    &larr; Rudi Kwenye Tovuti
                </a>
            </div>
        </div>

        <p class="text-center text-white/30 text-[9px] font-bold uppercase tracking-[0.2em] mt-10">
            &copy; 2026 Tanzania Plots Company Limited. Secure Access Only.
        </p>
    </div>

</body>
</html>
