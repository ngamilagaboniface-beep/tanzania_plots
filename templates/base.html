<!DOCTYPE html>
<html>
<head>
    <title>Tanzania Plots</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <a href="{{ url_for('index') }}" class="logo-box">
            <div class="logo-icon">
                <span class="t-blue">T</span><span class="p-red">P</span>
                <i class="fa-solid fa-house house-roof"></i>
            </div>
            <div class="logo-text">
                <span class="company-name">TANZANIA PLOTS</span>
                <span class="tagline">OWN LAND, BUILD YOUR LEGACY</span>
            </div>
        </a>
        <nav class="nav-links">
            <a href="{{ url_for('index') }}">HOME</a>
            <a href="{{ url_for('properties') }}">PROPERTIES</a>
            <a href="{{ url_for('admin_login') }}">ADMIN</a>
        </nav>
    </header>

    <div class="container" style="max-width: 1200px; margin: auto; padding: 20px;">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for cat, msg in messages %}
              <div style="padding: 15px; margin-bottom: 20px; border-radius: 5px; background: {% if cat=='success' %}#d4edda{% else %}#f8d7da{% endif %};">
                {{ msg }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
