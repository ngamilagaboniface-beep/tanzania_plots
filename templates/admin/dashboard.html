{% extends "base.html" %}
{% block content %}
<div class="container" style="margin-top: 60px; min-height: 50vh;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 40px;">
        <h2 style="color: #003399;">Admin Dashboard</h2>
        <a href="{{ url_for('admin_plot_create') }}" class="btn" style="background:#10b981; color:white; padding: 10px 20px; border-radius: 8px; text-decoration:none;">Add Property</a>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px;">
        <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid #003399;">
            <h1 style="font-size: 3rem; color: #333; margin-bottom: 10px;">{{ plots_count }}</h1>
            <h3 style="color: #666; margin-bottom: 20px;">Total Properties</h3>
            <a href="{{ url_for('properties') }}" class="btn" style="background: #f0f0f0; color: #333; width: 100%; display:block; padding:10px; border-radius:8px; text-decoration:none;">View All on Site</a>
        </div>
        
        <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid #ef4444;">
            <h1 style="font-size: 3rem; color: #333; margin-bottom: 10px;">&times;</h1>
            <h3 style="color: #666; margin-bottom: 20px;">Session</h3>
            <a href="{{ url_for('admin_logout') }}" class="btn" style="background: #ef4444; color: white; width: 100%; display:block; padding:10px; border-radius:8px; text-decoration:none;">Logout</a>
        </div>
    </div>
</div>
{% endblock %}
