{% extends "base.html" %}
{% block content %}
<div class="container" style="margin-top: 60px; margin-bottom: 60px;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color: var(--dark);">Admin Control Panel</h2>
        <a href="{{ url_for('admin_plot_create') }}" class="btn btn-blue"><i class="fa fa-plus"></i> Add New Property</a>
    </div>

    <div class="benefits-grid" style="margin-top: 30px;">
        
        <div class="benefit-card" style="border-top: 5px solid var(--primary-blue);">
            <div class="benefit-icon" style="background: #e6f0ff; color: var(--primary-blue);"><i class="fa fa-home"></i></div>
            <h3>Total Properties</h3>
            <p style="font-size: 3rem; font-weight: 900; color: var(--primary-blue); margin: 10px 0;">{{ plots_count }}</p>
            <a href="{{ url_for('admin_plots') }}" class="btn btn-blue" style="width:100%;">Manage Properties</a>
        </div>

        <div class="benefit-card" style="border-top: 5px solid var(--primary-red);">
            <div class="benefit-icon" style="background: #ffe6e6; color: var(--primary-red);"><i class="fa fa-shield-alt"></i></div>
            <h3>Security Setup</h3>
            <p style="margin: 20px 0;">Update your admin password regularly to keep the real estate portal completely secure.</p>
            <a href="{{ url_for('admin_change_password') }}" class="btn" style="background: var(--primary-red); color: white; width:100%;">Change Password</a>
        </div>
        
    </div>
</div>
{% endblock %}
