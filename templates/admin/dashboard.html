{% extends "base.html" %}
{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-top:30px">
    <h1>Welcome, Admin</h1>
    <a href="{{ url_for('admin_plot_create') }}" class="btn btn-blue">+ Add New Plot</a>
</div>

<div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:20px; margin-top:30px">
    <div class="stat-card">
        <h3>Total Properties</h3>
        <div class="number">{{ plots_count }}</div>
        <a href="{{ url_for('admin_plots') }}" style="text-decoration:none; color:var(--primary-blue)">Manage All &rarr;</a>
    </div>
</div>
{% endblock %}
