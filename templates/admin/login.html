{% extends "base.html" %}
{% block content %}
<div class="login-container">
    <h2 style="text-align:center; color:var(--primary-blue)">Admin Login</h2>
    <form method="POST">
        {{ form.hidden_tag() }}
        <label>Username</label>
        {{ form.username() }}
        <label>Password</label>
        {{ form.password() }}
        <button type="submit" class="btn btn-blue" style="width:100%">Enter Dashboard</button>
    </form>
</div>
{% endblock %}
