{% extends "base.html" %}
{% block content %}
<div class="container" style="margin-top: 40px; margin-bottom: 60px;">
    <h2 style="color: #003399; margin-bottom: 30px;">Add New Property</h2>
    
    <div style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
        <form method="POST" action="{{ url_for('admin_plot_create') }}" enctype="multipart/form-data">
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">Title</label>
                    <input type="text" name="title" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <div>
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">Location</label>
                    <input type="text" name="location" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">Price (TZS)</label>
                    <input type="number" name="price" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <div>
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">Size (Sqm)</label>
                    <input type="text" name="sqm_size" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <div>
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">Status</label>
                    <select name="status" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                        <option value="Available">Available</option>
                        <option value="Sold">Sold</option>
                    </select>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="font-weight: bold; margin-bottom: 8px; display: block;">Description</label>
                <textarea name="description" rows="5" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;"></textarea>
            </div>

            <div style="margin-bottom: 30px; padding: 20px; background: #f9f9f9; border: 2px dashed #ddd; border-radius: 8px;">
                <label style="font-weight: bold; margin-bottom: 8px; display: block;">Upload Images</label>
                <input type="file" name="images" multiple accept="image/*" style="width: 100%;">
            </div>

            <button type="submit" style="background: #10b981; color: white; width: 100%; padding: 15px; font-size: 1.1rem; border: none; border-radius: 8px; cursor: pointer;">Publish Property</button>
        </form>
    </div>
</div>
{% endblock %}
