{% extends "base.html" %}
{% block content %}
<div class="login-container" style="max-width:600px">
    <h2>{{ title }}</h2>
    <form method="POST" enctype="multipart/form-data">
        {{ form.hidden_tag() }}
        <label>Title</label>{{ form.title() }}
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Price (TZS)</label>{{ form.price() }}</div>
            <div style="flex:1"><label>Sqm</label>{{ form.sqm_size() }}</div>
        </div>
        <label>Location</label>{{ form.location() }}
        <label>Status</label>{{ form.status() }}
        <label>Description</label>{{ form.description(rows=4) }}
        <label>Images</label>
        <input type="file" name="images" multiple>
        <button type="submit" class="btn btn-blue" style="width:100%; margin-top:20px">Save Property</button>
    </form>
</div>
{% endblock %}
