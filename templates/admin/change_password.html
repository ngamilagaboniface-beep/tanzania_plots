{% extends "base.html" %}
{% block content %}
<div class="form-panel" style="max-width: 500px; margin-top: 80px;">
    <h2 style="text-align:center; color:var(--primary-blue); margin-bottom: 20px;">
        <i class="fa fa-lock"></i> Change Admin Password
    </h2>
    
    <form method="POST">
        {{ form.hidden_tag() }}
        
        <div class="search-form-group">
            <label>Current Password</label>
            {{ form.old_password(class="search-input") }}
        </div>
        
        <div class="search-form-group">
            <label>New Password (min 6 characters)</label>
            {{ form.new_password(class="search-input") }}
        </div>
        
        <button type="submit" class="btn btn-blue" style="width:100%; margin-top:20px;">
            Update Password
        </button>
        
        <a href="{{ url_for('admin_dashboard') }}" style="display:block; text-align:center; margin-top:15px; color:#666; text-decoration:none;">Cancel and return to Dashboard</a>
    </form>
</div>
{% endblock %}
