{% extends "base.html" %}
{% block content %}
<h2 style="margin-top:30px">Manage Properties</h2>
<div style="overflow-x:auto">
    <table class="admin-table">
        <thead>
            <tr>
                <th>Title</th>
                <th>Location</th>
                <th>Price (TZS)</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for plot in plots %}
            <tr>
                <td>{{ plot.title }}</td>
                <td>{{ plot.location }}</td>
                <td>{{ "{:,.0f}".format(plot.price) }}</td>
                <td style="color:{% if plot.status == 'Available' %}green{% else %}red{% endif %}; font-weight:bold">{{ plot.status }}</td>
                <td><a href="{{ url_for('property_detail', plot_id=plot.id) }}" class="btn btn-blue btn-small">View</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
