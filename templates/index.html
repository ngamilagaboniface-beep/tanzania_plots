{% extends "base.html" %}
{% block content %}
<div class="slideshow">
    {% for plot in plots %}
        <div class="slide {% if loop.first %}active{% endif %}" 
             style="background-image: url('{{ url_for('static', filename='uploads/' + plot.images[0].filename) if plot.images else '' }}'); background-color: #ddd;">
            <div class="slide-info">
                <h2>{{ plot.title }}</h2>
                <p>{{ plot.location }} | TZS {{ "{:,.0f}".format(plot.price) }}</p>
                <a href="{{ url_for('property_detail', plot_id=plot.id) }}" class="btn" style="background: white; color: var(--primary-blue);">View Details</a>
            </div>
        </div>
    {% endfor %}
</div>

<script>
    let slides = document.querySelectorAll('.slide');
    let current = 0;
    if(slides.length > 0) {
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 5000);
    }
</script>
{% endblock %}
